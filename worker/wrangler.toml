name = "tensorfeed-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "tensorfeed.ai/api/*", zone_name = "tensorfeed.ai" }
]

[triggers]
crons = [
  "*/10 * * * *",
  "*/5 * * * *",
  "0 * * * *",
  "0 6 * * 1",
  "30 8 * * *",
  # X/Twitter auto-posting DISABLED (account flagged as spam, 2026-04-04)
  # When re-enabling, start with 1 post/day: "30 14 * * *"
  # After 30 days with no flags, increase to 2/day: "30 8,17 * * *"
]

[[kv_namespaces]]
binding = "TENSORFEED_NEWS"
id = "4924c4d8a64446cea111fd63a5b3455a"

[[kv_namespaces]]
binding = "TENSORFEED_STATUS"
id = "68eec8e4d37349a6adc1278c9280f653"

[[kv_namespaces]]
binding = "TENSORFEED_CACHE"
id = "4de30d8becd24b3bba9556b98bad8e69"

[vars]
ENVIRONMENT = "production"
SITE_URL = "https://tensorfeed.ai"
INDEXNOW_KEY = "5903913788b6a62e3d10e63e3319020a"
